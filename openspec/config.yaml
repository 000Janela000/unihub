schema: spec-driven

context: |
  Project: UniSchedule — University schedule & exam tracker for Agricultural University of Georgia (agruni.edu.ge)
  Tech stack: Next.js 14 (App Router), TypeScript strict, Tailwind CSS, shadcn/ui, Framer Motion, vaul (bottom sheets), sonner (toasts), lucide-react, papaparse (CSV), xlsx (Excel), date-fns, googleapis + google-auth-library, NextAuth.js v5, web-push + Service Worker
  Architecture: Next.js App Router with src/ directory, API routes for server-side data fetching
  Key rules:
    - Georgian language primary, English secondary (i18n via React context)
    - All data flows through server-side API routes with 15-minute TTL cache
    - Exam schedule fetched from public Google Sheets via gviz CSV API (no auth needed)
    - Lecture schedule fetched via Service Account or Admin OAuth (protected sheet)
    - Group codes (e.g., chem24-01, bio24-01) decoded to faculty/year/program
    - PWA with Service Worker for offline support and push notifications
    - Mobile-first responsive design with bottom navigation
    - No student needs to sign in for core experience (exam + lecture viewing)
    - Path alias @/* → src/*
  Conventions: see CLAUDE.md for full details

rules:
  tasks:
    - Reference specific files/directories when possible
    - Keep tasks scoped to a single feature or module
    - Include test expectations where applicable
    - Mark phase number for each task group
